<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ChemLab — Interactive 3D Chemistry / Science Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/128/three.min.js"></script>
<style>
  :root{
    --bg:#0E1A2B; --panel:#152741; --panel-soft:#1B324F; --line:#2A4266;
    --text:#EDEFF2; --text-dim:#8FA3BF; --teal:#3FCBB0; --coral:#E8664D; --gold:#F2B134; --blue:#5B9BD9;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--bg); color:var(--text); font-family:'IBM Plex Sans', sans-serif;
    display:flex; min-height:100vh;
  }
  button, select{font-family:inherit;}
  button:focus-visible, select:focus-visible{outline:2px solid var(--teal); outline-offset:2px;}
  h1,h2,h3{font-family:'Space Grotesk', sans-serif; margin:0;}
  .mono{font-family:'IBM Plex Mono', monospace;}

  /* Sidebar */
  #sidebar{
    width:200px; border-right:1px solid var(--line); padding:24px 14px;
    display:flex; flex-direction:column; gap:4px; flex-shrink:0;
  }
  #sidebar .brand{display:flex; align-items:center; gap:8px; padding:0 8px 22px;}
  #sidebar .brand span{font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:15px;}
  .nav-btn{
    display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:7px;
    background:transparent; border:none; color:var(--text-dim); font-size:13.5px;
    cursor:pointer; text-align:left; width:100%;
  }
  .nav-btn.active{background:var(--panel-soft); color:var(--text);}
  #sidebar .footer-note{margin-top:auto; padding:10px 8px; font-size:11px; color:var(--text-dim); line-height:1.5;}

  #content{flex:1; overflow-y:auto;}
  .page{padding:36px 40px;}
  .eyebrow{font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:2px; color:var(--teal); text-transform:uppercase;}
  .desc{color:var(--text-dim); font-size:14px; max-width:520px; margin:0;}

  /* Buttons */
  .btn-primary{
    background:var(--teal); color:#04241D; border:none; border-radius:8px;
    padding:11px 18px; font-family:'Space Grotesk', sans-serif; font-size:14px; font-weight:600;
    display:inline-flex; align-items:center; gap:6px; cursor:pointer;
  }
  .btn-ghost{
    background:transparent; color:var(--text); border:1px solid var(--line); border-radius:8px;
    padding:11px 18px; font-family:'Space Grotesk', sans-serif; font-size:14px;
    display:inline-flex; align-items:center; gap:6px; cursor:pointer;
  }
  .btn-ghost-sm{padding:6px 10px; font-size:12px; border-radius:6px;}
  .btn-primary-sm{padding:6px 10px; font-size:12px; border-radius:6px;}
  .btn-done-sm{background:var(--panel-soft); color:var(--teal); border:1px solid rgba(63,203,176,0.4);}
  .icon-btn{background:transparent; border:none; color:var(--text-dim); cursor:pointer;}
  button:disabled{opacity:0.4; cursor:not-allowed;}

  /* Home */
  .hero-title{font-size:42px; line-height:1.05; margin:6px 0 14px; max-width:620px;}
  .hero-desc{color:var(--text-dim); max-width:520px; font-size:15.5px; line-height:1.6; margin-bottom:28px;}
  .sample-card{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:4px; max-width:640px;}
  .sample-footer{display:flex; justify-content:space-between; align-items:center; padding:10px 16px 14px;}
  .feature-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:40px; max-width:760px;}
  .feature-card{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:16px;}
  .feature-card .ficon{color:var(--teal); margin-bottom:8px;}
  .feature-card .ftitle{font-family:'Space Grotesk', sans-serif; font-size:15px; margin-bottom:4px;}
  .feature-card .fdesc{color:var(--text-dim); font-size:13px; line-height:1.5;}

  /* Lessons */
  .lesson-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:14px; margin-top:24px;}
  .lesson-card{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:16px; display:flex; flex-direction:column; gap:10px;}
  .lesson-card.read{border-color:rgba(63,203,176,0.4);}
  .lesson-top{display:flex; justify-content:space-between; align-items:flex-start;}
  .lesson-blurb{color:var(--text-dim); font-size:13.5px; line-height:1.5; margin:0;}
  .lesson-actions{display:flex; gap:8px; margin-top:auto;}
  .level-badge{
    font-family:'IBM Plex Mono', monospace; font-size:10px; letter-spacing:1px; text-transform:uppercase;
    padding:3px 8px; border-radius:4px;
  }
  .level-badge.beginner{color:var(--teal); border:1px solid rgba(63,203,176,0.33); background:rgba(63,203,176,0.08);}
  .level-badge.advanced{color:var(--gold); border:1px solid rgba(242,177,52,0.33); background:rgba(242,177,52,0.08);}
  .formula sub{font-size:10px;}

  /* Lab */
  .tabs{display:flex; gap:8px; margin:20px 0 18px;}
  .tab-btn{padding:8px 14px;}
  .lab-view-grid{display:grid; grid-template-columns:220px 1fr; gap:20px;}
  .nav-pill{
    background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:10px 12px;
    display:flex; justify-content:space-between; align-items:center; cursor:pointer; color:var(--text); font-size:13px; width:100%;
  }
  .nav-pill.active{border:1px solid var(--teal); background:var(--panel-soft);}
  .viewer-card{background:var(--panel); border:1px solid var(--line); border-radius:12px; position:relative;}
  .viewer-title{position:absolute; top:14px; left:16px; display:flex; gap:8px; align-items:center;}
  .viewer-title span{font-family:'Space Grotesk', sans-serif; font-size:16px;}
  .viewer-actions{position:absolute; top:14px; right:16px;}
  .viewer-info{
    position:absolute; bottom:14px; left:16px; right:16px; background:var(--panel-soft);
    border:1px solid var(--line); border-radius:8px; padding:10px 14px; display:flex;
    justify-content:space-between; align-items:center; gap:10px;
  }
  .viewer-caption{padding:0 16px 12px; color:var(--text-dim); font-size:12.5px;}
  .lab-build-grid{display:grid; grid-template-columns:1fr 260px; gap:20px;}
  .atom-palette{display:flex; gap:8px; padding:0 16px 16px; flex-wrap:wrap; align-items:center;}
  .atom-btn{
    background:var(--panel-soft); border:1px solid; border-radius:20px; padding:6px 12px;
    color:var(--text); font-family:'IBM Plex Mono', monospace; font-size:12px; cursor:pointer;
    display:inline-flex; align-items:center;
  }
  .atom-dot{width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:6px;}
  .build-panel{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; display:flex; flex-direction:column; gap:12px;}
  .label-mono{font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--text-dim); letter-spacing:1px;}
  .select-style{background:var(--panel-soft); border:1px solid var(--line); border-radius:8px; color:var(--text); padding:9px 10px; font-size:13px; width:100%;}
  .feedback{font-size:12.5px; line-height:1.5;}
  .feedback.ok{color:var(--teal);}
  .feedback.bad{color:var(--coral);}

  /* Quiz */
  .quiz-card{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:22px; max-width:560px;}
  .quiz-question{font-family:'Space Grotesk', sans-serif; font-size:18px; margin-bottom:16px;}
  .option-btn{
    text-align:left; background:var(--panel-soft); border:1px solid var(--line); border-radius:8px;
    padding:10px 14px; color:var(--text); cursor:pointer; font-size:14px; width:100%; display:block; margin-bottom:8px;
  }
  .option-btn.active{border:1px solid var(--teal); background:rgba(63,203,176,0.1);}
  .quiz-result{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:24px; text-align:center; max-width:560px;}

  /* Progress */
  .progress-grid{display:grid; grid-template-columns:1fr 280px; gap:20px; margin-top:24px; max-width:820px;}
  .progress-card{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:22px;}
  .bar-row{margin-bottom:16px;}
  .bar-top{display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px;}
  .bar-top .pct{font-family:'IBM Plex Mono', monospace;}
  .bar-track{height:8px; background:var(--panel-soft); border-radius:4px; overflow:hidden;}
  .bar-fill{height:100%; transition:width .4s ease;}
  .level-card{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:22px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;}

  svg.icon{vertical-align:-3px;}
</style>
</head>

<script>
/* ============================================================
   DATA
============================================================ */
const TOKENS = {
  teal:"#3FCBB0", coral:"#E8664D", gold:"#F2B134", blue:"#5B9BD9", textDim:"#8FA3BF"
};

const ELEMENTS = {
  H:  { name:"Hydrogen", color:"#F4F1E9", radius:0.32, fact:"The lightest and most abundant element in the universe." },
  C:  { name:"Carbon",   color:"#44586F", radius:0.55, fact:"Forms the backbone of every known organic molecule." },
  N:  { name:"Nitrogen", color:"#5B9BD9", radius:0.48, fact:"Makes up about 78% of Earth's atmosphere." },
  O:  { name:"Oxygen",   color:"#E8664D", radius:0.50, fact:"Essential for combustion and cellular respiration." },
  Cl: { name:"Chlorine", color:"#3FCBB0", radius:0.58, fact:"A reactive halogen used in water purification." },
};

const MOLECULES = {
  water: { key:"water", name:"Water", formula:"H2O", level:"Beginner",
    blurb:"Bent geometry, 104.5° bond angle — the solvent of life.",
    atoms:[{el:"O",pos:[0,0,0]},{el:"H",pos:[0.78,0.62,0]},{el:"H",pos:[-0.78,0.62,0]}],
    bonds:[[0,1],[0,2]] },
  hydrogenChloride: { key:"hydrogenChloride", name:"Hydrogen Chloride", formula:"HCl", level:"Beginner",
    blurb:"A simple diatomic acid — one bond, sharp reactivity.",
    atoms:[{el:"H",pos:[-0.7,0,0]},{el:"Cl",pos:[0.7,0,0]}],
    bonds:[[0,1]] },
  ammonia: { key:"ammonia", name:"Ammonia", formula:"NH3", level:"Beginner",
    blurb:"Trigonal pyramidal shape with a lone electron pair on nitrogen.",
    atoms:[{el:"N",pos:[0,0.3,0]},{el:"H",pos:[0.85,-0.35,0.4]},{el:"H",pos:[-0.85,-0.35,0.4]},{el:"H",pos:[0,-0.35,-0.9]}],
    bonds:[[0,1],[0,2],[0,3]] },
  methane: { key:"methane", name:"Methane", formula:"CH4", level:"Advanced",
    blurb:"A perfect tetrahedron — the simplest hydrocarbon.",
    atoms:[{el:"C",pos:[0,0,0]},{el:"H",pos:[0.9,0.9,0.9]},{el:"H",pos:[-0.9,-0.9,0.9]},{el:"H",pos:[-0.9,0.9,-0.9]},{el:"H",pos:[0.9,-0.9,-0.9]}],
    bonds:[[0,1],[0,2],[0,3],[0,4]] },
  carbonDioxide: { key:"carbonDioxide", name:"Carbon Dioxide", formula:"CO2", level:"Advanced",
    blurb:"A linear molecule with two rigid double bonds.",
    atoms:[{el:"C",pos:[0,0,0]},{el:"O",pos:[1.3,0,0]},{el:"O",pos:[-1.3,0,0]}],
    bonds:[[0,1],[0,2]] },
  ozone: { key:"ozone", name:"Ozone", formula:"O3", level:"Advanced",
    blurb:"A bent, resonance-stabilized trio that shields us from UV light.",
    atoms:[{el:"O",pos:[0,0,0]},{el:"O",pos:[0.95,0.6,0]},{el:"O",pos:[-0.95,0.6,0]}],
    bonds:[[0,1],[0,2]] },
};
const MOLECULE_LIST = Object.values(MOLECULES);
const BUILD_TARGETS = [MOLECULES.water, MOLECULES.hydrogenChloride, MOLECULES.ammonia, MOLECULES.methane, MOLECULES.carbonDioxide];

const QUIZ = [
  { q:"What is the approximate bond angle in a water molecule?", options:["180°","104.5°","90°","120°"], answer:1 },
  { q:"Which element makes up ~78% of the atmosphere?", options:["Oxygen","Carbon","Nitrogen","Chlorine"], answer:2 },
  { q:"Methane's molecular geometry is described as:", options:["Linear","Trigonal pyramidal","Bent","Tetrahedral"], answer:3 },
  { q:"How many total atoms are in one molecule of ozone (O3)?", options:["1","2","3","4"], answer:2 },
  { q:"Carbon dioxide's shape is best described as:", options:["Bent","Linear","Pyramidal","Tetrahedral"], answer:1 },
];

/* ============================================================
   APP STATE
============================================================ */
const state = {
  page: "home",
  labInitial: null,
  lessonsRead: new Set(),
  labSolved: new Set(),
  quizResult: null,
  lab: { mode:"view", current:"water", buildAtoms:[], target: BUILD_TARGETS[0].key, feedback:null },
  quiz: { i:0, selected:null, score:0, done:false },
};

/* ============================================================
   ICONS (tiny inline SVG helper)
============================================================ */
function icon(name, size=16, color="currentColor"){
  const paths = {
    beaker:'<path d="M9 3h6M10 3v5.5L5 18a2 2 0 0 0 2 3h10a2 2 0 0 0 2-3l-5-9.5V3"/>',
    book:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',
    flask:'<path d="M9 2v6.3a2 2 0 0 1-.3 1L4.3 17a2 2 0 0 0 1.7 3h12a2 2 0 0 0 1.7-3l-4.4-7.7a2 2 0 0 1-.3-1V2"/><path d="M7 2h10"/><path d="M8 15h8"/>',
    list:'<path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/>',
    trend:'<path d="M3 17 9 11 13 15 21 7"/><path d="M14 7h7v7"/>',
    check:'<path d="M20 6 9 17l-5-5"/>',
    x:'<path d="M18 6 6 18"/><path d="M6 6l12 12"/>',
    sparkles:'<path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M18.4 5.6l-2.8 2.8M8.4 15.6l-2.8 2.8"/>',
    reset:'<path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/>',
    award:'<circle cx="12" cy="8" r="6"/><path d="m9 14-1.5 7L12 19l4.5 2L15 14"/>',
    chevron:'<path d="m9 18 6-6-6-6"/>',
  };
  return `<svg class="icon" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${paths[name]||""}</svg>`;
}

/* ============================================================
   3D MOLECULE VIEWER (vanilla Three.js)
============================================================ */
function mountMolecule3D(container, { atoms, bonds, height=320, onAtomClick, assemble=false }){
  container.innerHTML = "";
  const width = container.clientWidth || 400;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, width/height, 0.1, 100);
  camera.position.set(0,0,6.5);

  const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setSize(width, height);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.65));
  const key1 = new THREE.PointLight(0x9fd8ff, 1.1); key1.position.set(4,5,6); scene.add(key1);
  const key2 = new THREE.PointLight(0xff9d7a, 0.5); key2.position.set(-5,-3,-4); scene.add(key2);

  const group = new THREE.Group();
  scene.add(group);

  const atomMeshes = [];
  const targetPositions = atoms.map(a => new THREE.Vector3(...a.pos));

  atoms.forEach((a,i) => {
    const info = ELEMENTS[a.el];
    const geo = new THREE.SphereGeometry(info.radius, 24, 24);
    const mat = new THREE.MeshStandardMaterial({ color: info.color, roughness:0.35, metalness:0.15 });
    const mesh = new THREE.Mesh(geo, mat);
    if (assemble){
      const dir = targetPositions[i].clone().normalize();
      if (dir.lengthSq() === 0) dir.set(1,0,0);
      mesh.position.copy(targetPositions[i].clone().add(dir.multiplyScalar(4 + Math.random()*2)));
    } else {
      mesh.position.copy(targetPositions[i]);
    }
    mesh.userData = { symbol:a.el, index:i };
    group.add(mesh);
    atomMeshes.push(mesh);
  });

  const bondMeshes = [];
  bonds.forEach(([i,j]) => {
    const a = targetPositions[i], b = targetPositions[j];
    const mid = a.clone().add(b).multiplyScalar(0.5);
    const dir = b.clone().sub(a);
    const len = dir.length();
    const geo = new THREE.CylinderGeometry(0.09, 0.09, len, 12);
    const mat = new THREE.MeshStandardMaterial({ color:"#B9C6D6", roughness:0.5 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(mid);
    mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());
    mesh.visible = !assemble;
    group.add(mesh);
    bondMeshes.push(mesh);
  });

  let isDown=false, prevX=0, prevY=0, rotY=0.4, rotX=-0.2;
  const applyRot = () => group.rotation.set(rotX, rotY, 0);
  applyRot();

  const getXY = (e) => ({
    x: e.touches ? e.touches[0].clientX : e.clientX,
    y: e.touches ? e.touches[0].clientY : e.clientY,
  });
  const onDown = (e) => { isDown = true; const p = getXY(e); prevX = p.x; prevY = p.y; };
  const onUp = () => { isDown = false; };
  const onMove = (e) => {
    if (!isDown) return;
    const p = getXY(e);
    rotY += (p.x - prevX) * 0.008;
    rotX += (p.y - prevY) * 0.008;
    rotX = Math.max(-1.3, Math.min(1.3, rotX));
    prevX = p.x; prevY = p.y;
    applyRot();
  };

  const raycaster = new THREE.Raycaster();
  const onClick = (e) => {
    const rect = renderer.domElement.getBoundingClientRect();
    const mouse = new THREE.Vector2(
      ((e.clientX-rect.left)/rect.width)*2-1,
      -((e.clientY-rect.top)/rect.height)*2+1
    );
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(atomMeshes);
    if (hits.length && onAtomClick) onAtomClick(hits[0].object.userData.symbol);
  };

  const dom = renderer.domElement;
  dom.style.cursor = "grab";
  dom.addEventListener("mousedown", onDown);
  dom.addEventListener("mouseup", onUp);
  dom.addEventListener("mouseleave", onUp);
  dom.addEventListener("mousemove", onMove);
  dom.addEventListener("click", onClick);
  dom.addEventListener("touchstart", onDown);
  dom.addEventListener("touchend", onUp);
  dom.addEventListener("touchmove", onMove);

  let raf, t=0, disposed=false;
  const animate = () => {
    if (disposed) return;
    t += 0.016;
    if (assemble){
      let allArrived = true;
      atomMeshes.forEach((m,i) => {
        m.position.lerp(targetPositions[i], 0.06);
        if (m.position.distanceTo(targetPositions[i]) > 0.02) allArrived = false;
      });
      if (allArrived) bondMeshes.forEach(m => m.visible = true);
    } else {
      group.children.forEach(c => {
        if (c.geometry && c.geometry.type === "SphereGeometry"){
          c.scale.setScalar(1 + Math.sin(t*2 + c.position.x) * 0.01);
        }
      });
    }
    renderer.render(scene, camera);
    raf = requestAnimationFrame(animate);
  };
  animate();

  const onResize = () => {
    const w = container.clientWidth || 400;
    camera.aspect = w/height;
    camera.updateProjectionMatrix();
    renderer.setSize(w, height);
  };
  window.addEventListener("resize", onResize);

  return () => {
    disposed = true;
    cancelAnimationFrame(raf);
    window.removeEventListener("resize", onResize);
    dom.removeEventListener("mousedown", onDown);
    dom.removeEventListener("mouseup", onUp);
    dom.removeEventListener("mouseleave", onUp);
    dom.removeEventListener("mousemove", onMove);
    dom.removeEventListener("click", onClick);
    dom.removeEventListener("touchstart", onDown);
    dom.removeEventListener("touchend", onUp);
    dom.removeEventListener("touchmove", onMove);
    renderer.dispose();
  };
}
let currentViewerCleanup = null;
function setViewer(container, opts){
  if (currentViewerCleanup) currentViewerCleanup();
  currentViewerCleanup = mountMolecule3D(container, opts);
}

/* ============================================================
   SMALL RENDER HELPERS
============================================================ */
function formulaHTML(formula){
  const parts = formula.match(/[A-Z][a-z]?\d*/g) || [];
  return `<span class="mono formula" style="font-size:15px;">` + parts.map(p => {
    const m = p.match(/([A-Za-z]+)(\d*)/);
    return `${m[1]}${m[2] ? `<sub>${m[2]}</sub>` : ""}`;
  }).join("") + `</span>`;
}
function levelBadgeHTML(level){
  const cls = level === "Advanced" ? "advanced" : "beginner";
  return `<span class="level-badge ${cls}">${level}</span>`;
}

/* ============================================================
   PAGE RENDERERS
============================================================ */
function pageHeaderHTML(eyebrow, title, desc){
  return `
    <div class="eyebrow">${eyebrow}</div>
    <h2 style="font-size:28px; margin:6px 0 6px;">${title}</h2>
    <p class="desc">${desc}</p>
  `;
}

function renderHome(root){
  root.innerHTML = `
    <div class="page">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:6px;">
        <span style="width:8px;height:8px;border-radius:50%;background:${TOKENS.teal};box-shadow:0 0 8px ${TOKENS.teal};"></span>
        <span class="mono" style="font-size:11px; letter-spacing:2px; color:${TOKENS.textDim}; text-transform:uppercase;">Specimen Interface / Live</span>
      </div>
      <h1 class="hero-title">Turn flat diagrams into molecules you can spin, break, and rebuild.</h1>
      <p class="hero-desc">A science lab built for one problem: students memorize chemistry diagrams instead of understanding
      shape and structure. Here, every molecule is a 3D object you rotate with your own hand.</p>
      <div style="display:flex; gap:12px; margin-bottom:40px; flex-wrap:wrap;">
        <button class="btn-primary" id="go-lab">Enter the 3D Lab ${icon("chevron",16)}</button>
        <button class="btn-ghost" id="go-lessons">Browse lessons</button>
      </div>
      <div class="sample-card">
        <div id="home-viewer" style="width:100%; height:260px;"></div>
        <div class="sample-footer">
          <div class="mono" style="font-size:12px; color:${TOKENS.textDim};">SAMPLE — drag to rotate</div>
          ${formulaHTML("H2O")}
        </div>
      </div>
      <div class="feature-grid">
        <div class="feature-card"><div class="ficon">${icon("book",18)}</div><div class="ftitle">Lessons</div><div class="fdesc">Short reads on each molecule's shape and role.</div></div>
        <div class="feature-card"><div class="ficon">${icon("flask",18)}</div><div class="ftitle">3D Lab</div><div class="fdesc">Rotate real molecules or build your own from atoms.</div></div>
        <div class="feature-card"><div class="ficon">${icon("list",18)}</div><div class="ftitle">Quiz</div><div class="fdesc">Check what stuck, with instant scoring.</div></div>
      </div>
    </div>
  `;
  root.querySelector("#go-lab").onclick = () => go("lab");
  root.querySelector("#go-lessons").onclick = () => go("lessons");
  setViewer(root.querySelector("#home-viewer"), { atoms:MOLECULES.water.atoms, bonds:MOLECULES.water.bonds, height:260 });
}

function renderLessons(root){
  root.innerHTML = `
    <div class="page">
      ${pageHeaderHTML("Reading Room", "Lessons", "Mark a lesson read once you understand the shape and role of the molecule.")}
      <div class="lesson-grid">
        ${MOLECULE_LIST.map(m => {
          const read = state.lessonsRead.has(m.key);
          return `
          <div class="lesson-card ${read?"read":""}" data-key="${m.key}">
            <div class="lesson-top">
              <div>
                <div style="font-family:'Space Grotesk', sans-serif; font-size:17px;">${m.name}</div>
                ${formulaHTML(m.formula)}
              </div>
              ${levelBadgeHTML(m.level)}
            </div>
            <p class="lesson-blurb">${m.blurb}</p>
            <div class="lesson-actions">
              <button class="btn-ghost btn-ghost-sm view-btn" data-key="${m.key}">View in 3D</button>
              <button class="${read?"btn-done-sm":"btn-primary-sm"} toggle-btn" data-key="${m.key}">
                ${read ? icon("check",14)+" Read" : "Mark read"}
              </button>
            </div>
          </div>`;
        }).join("")}
      </div>
    </div>
  `;
  root.querySelectorAll(".view-btn").forEach(b => b.onclick = () => go("lab", b.dataset.key));
  root.querySelectorAll(".toggle-btn").forEach(b => b.onclick = () => {
    const k = b.dataset.key;
    state.lessonsRead.has(k) ? state.lessonsRead.delete(k) : state.lessonsRead.add(k);
    renderLessons(root);
  });
}

function renderLab(root){
  const L = state.lab;
  const molecule = MOLECULES[L.current];

  root.innerHTML = `
    <div class="page">
      ${pageHeaderHTML("Bench Station", "3D Lab", "Rotate real molecules, or build compounds atom by atom.")}
      <div class="tabs">
        <button class="${L.mode==='view'?'btn-primary-sm':'btn-ghost-sm'} tab-btn" id="tab-view">View molecule</button>
        <button class="${L.mode==='build'?'btn-primary-sm':'btn-ghost-sm'} tab-btn" id="tab-build">Build a compound</button>
      </div>
      <div id="lab-body"></div>
    </div>
  `;
  root.querySelector("#tab-view").onclick = () => { L.mode = "view"; renderLab(root); };
  root.querySelector("#tab-build").onclick = () => { L.mode = "build"; renderLab(root); };

  const body = root.querySelector("#lab-body");

  if (L.mode === "view"){
    body.innerHTML = `
      <div class="lab-view-grid">
        <div id="mol-nav" style="display:flex; flex-direction:column; gap:6px;">
          ${MOLECULE_LIST.map(m => `
            <button class="nav-pill ${m.key===L.current?'active':''}" data-key="${m.key}">
              <span>${m.name}</span>${formulaHTML(m.formula)}
            </button>`).join("")}
        </div>
        <div class="viewer-card">
          <div id="lab-viewer" style="width:100%; height:340px;"></div>
          <div class="viewer-title"><span>${molecule.name}</span>${levelBadgeHTML(molecule.level)}</div>
          <div class="viewer-actions"><button class="btn-ghost btn-ghost-sm" id="react-btn">${icon("sparkles",13)} Simulate assembly</button></div>
          <div id="atom-info"></div>
          <div class="viewer-caption">${molecule.blurb} Click any atom for details.</div>
        </div>
      </div>
    `;
    body.querySelectorAll(".nav-pill").forEach(b => b.onclick = () => { L.current = b.dataset.key; renderLab(root); });

    const infoBox = body.querySelector("#atom-info");
    const showInfo = (el) => {
      const info = ELEMENTS[el];
      infoBox.innerHTML = `
        <div class="viewer-info">
          <div><strong style="color:${info.color};">${info.name}</strong>
          <span style="color:${TOKENS.textDim}; font-size:13px;"> — ${info.fact}</span></div>
          <button class="icon-btn" id="close-info">${icon("x",14)}</button>
        </div>`;
      infoBox.querySelector("#close-info").onclick = () => infoBox.innerHTML = "";
    };

    setViewer(body.querySelector("#lab-viewer"), {
      atoms: molecule.atoms, bonds: molecule.bonds, height:340,
      onAtomClick: showInfo,
    });

    body.querySelector("#react-btn").onclick = () => {
      setViewer(body.querySelector("#lab-viewer"), {
        atoms: molecule.atoms, bonds: molecule.bonds, height:340, assemble:true, onAtomClick: showInfo,
      });
    };
  } else {
    const counts = {};
    L.buildAtoms.forEach(a => counts[a.el] = (counts[a.el]||0)+1);
    const order = ["C","N","O","Cl","H"];
    const buildFormula = order.filter(e=>counts[e]).map(e=>`${e}${counts[e]>1?counts[e]:""}`).join("");

    body.innerHTML = `
      <div class="lab-build-grid">
        <div class="viewer-card">
          <div id="build-viewer" style="width:100%; height:300px;"></div>
          <div class="atom-palette">
            ${Object.keys(ELEMENTS).map(el => `
              <button class="atom-btn" style="border-color:${ELEMENTS[el].color};" data-el="${el}">
                <span class="atom-dot" style="background:${ELEMENTS[el].color};"></span>${el}
              </button>`).join("")}
            <button class="btn-ghost btn-ghost-sm" id="clear-btn">${icon("reset",13)} Clear</button>
          </div>
        </div>
        <div class="build-panel">
          <div class="label-mono">YOUR MIX</div>
          <div style="font-size:22px;">${formulaHTML(buildFormula || "—")}</div>
          <div class="label-mono" style="margin-top:8px;">TARGET CHALLENGE</div>
          <select class="select-style" id="target-select">
            ${BUILD_TARGETS.map(t => `<option value="${t.key}" ${t.key===L.target?"selected":""}>${state.labSolved.has(t.key)?"✓ ":""}${t.name} (${t.formula})</option>`).join("")}
          </select>
          <button class="btn-primary" id="check-btn">Check compound</button>
          <div id="feedback-box"></div>
          <div style="margin-top:auto; font-size:12px; color:${TOKENS.textDim};">${state.labSolved.size} / ${BUILD_TARGETS.length} challenges solved</div>
        </div>
      </div>
    `;

    const atomsForView = L.buildAtoms.length ? L.buildAtoms : [{el:"H", pos:[0,0,0]}];
    setViewer(body.querySelector("#build-viewer"), { atoms:atomsForView, bonds:[], height:300 });

    body.querySelectorAll(".atom-btn").forEach(b => b.onclick = () => {
      const el = b.dataset.el;
      const angle = L.buildAtoms.length * 1.3;
      L.buildAtoms.push({ el, pos:[Math.cos(angle)*1.4, Math.sin(angle)*1.4, (L.buildAtoms.length%2)*0.6-0.3] });
      renderLab(root);
    });
    body.querySelector("#clear-btn").onclick = () => { L.buildAtoms = []; L.feedback = null; renderLab(root); };
    body.querySelector("#target-select").onchange = (e) => { L.target = e.target.value; L.feedback = null; renderLab(root); };

    const fbBox = body.querySelector("#feedback-box");
    if (L.feedback){
      fbBox.innerHTML = `<div class="feedback ${L.feedback.ok?'ok':'bad'}">${icon(L.feedback.ok?"check":"x",13)} ${L.feedback.msg}</div>`;
    }

    body.querySelector("#check-btn").onclick = () => {
      const t = MOLECULES[L.target];
      const c = {}; L.buildAtoms.forEach(a => c[a.el]=(c[a.el]||0)+1);
      const tc = {}; t.atoms.forEach(a => tc[a.el]=(tc[a.el]||0)+1);
      const match = Object.keys(tc).every(k => tc[k]===c[k]) && Object.keys(c).every(k => tc[k]===c[k]);
      if (match){
        state.labSolved.add(L.target);
        L.feedback = { ok:true, msg:`Correct — that's ${t.name} (${t.formula}).` };
      } else {
        const cur = order.filter(e=>c[e]).map(e=>`${e}${c[e]>1?c[e]:""}`).join("") || "empty";
        L.feedback = { ok:false, msg:`Not quite. ${t.name} is ${t.formula}. Current mix: ${cur}.` };
      }
      renderLab(root);
    };
  }
}

function renderQuiz(root){
  const Q = state.quiz;
  if (!Q.done){
    const cur = QUIZ[Q.i];
    root.innerHTML = `
      <div class="page">
        ${pageHeaderHTML("Checkpoint", "Quiz", "Five quick questions on molecular shape and composition.")}
        <div style="max-width:560px; margin-top:24px;">
          <div class="quiz-card">
            <div class="mono" style="font-size:11px; color:${TOKENS.textDim}; margin-bottom:10px;">QUESTION ${Q.i+1} / ${QUIZ.length}</div>
            <div class="quiz-question">${cur.q}</div>
            <div id="options"></div>
            <button class="btn-primary" id="submit-btn" style="margin-top:18px;" ${Q.selected===null?"disabled":""}>
              ${Q.i+1 < QUIZ.length ? "Next question" : "See results"}
            </button>
          </div>
        </div>
      </div>
    `;
    const opts = root.querySelector("#options");
    opts.innerHTML = cur.options.map((o,idx) => `<button class="option-btn ${Q.selected===idx?'active':''}" data-idx="${idx}">${o}</button>`).join("");
    opts.querySelectorAll(".option-btn").forEach(b => b.onclick = () => { Q.selected = Number(b.dataset.idx); renderQuiz(root); });
    root.querySelector("#submit-btn").onclick = () => {
      if (Q.selected === null) return;
      const correct = Q.selected === cur.answer;
      Q.score += correct ? 1 : 0;
      if (Q.i + 1 < QUIZ.length){ Q.i += 1; Q.selected = null; }
      else { Q.done = true; state.quizResult = { score:Q.score, total:QUIZ.length }; }
      renderQuiz(root);
    };
  } else {
    root.innerHTML = `
      <div class="page">
        ${pageHeaderHTML("Checkpoint", "Quiz", "Five quick questions on molecular shape and composition.")}
        <div style="max-width:560px; margin-top:24px;">
          <div class="quiz-result">
            <div style="margin-bottom:10px;">${icon("award",30,TOKENS.gold)}</div>
            <div style="font-size:22px; font-family:'Space Grotesk', sans-serif;">${Q.score} / ${QUIZ.length} correct</div>
            <p style="color:${TOKENS.textDim}; font-size:13.5px; margin:8px 0 18px;">
              ${Q.score===QUIZ.length ? "Perfect score — molecular structures fully absorbed." : "Review the 3D Lab and try again to raise your score."}
            </p>
            <button class="btn-ghost" id="retake-btn">${icon("reset",14)} Retake quiz</button>
          </div>
        </div>
      </div>
    `;
    root.querySelector("#retake-btn").onclick = () => {
      state.quiz = { i:0, selected:null, score:0, done:false };
      renderQuiz(root);
    };
  }
}

function renderProgress(root){
  const lessonPct = Math.round((state.lessonsRead.size / MOLECULE_LIST.length) * 100);
  const labPct = Math.round((state.labSolved.size / BUILD_TARGETS.length) * 100);
  const qr = state.quizResult;
  const quizPct = qr ? Math.round((qr.score / qr.total) * 100) : 0;
  const overall = Math.round((lessonPct + labPct + quizPct) / 3);
  const level = overall >= 80 ? "Advanced Chemist" : overall >= 40 ? "Lab Technician" : "Beginner Explorer";

  const bar = (label, pct, color) => `
    <div class="bar-row">
      <div class="bar-top"><span style="color:${TOKENS.textDim};">${label}</span><span class="pct">${pct}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${color};"></div></div>
    </div>`;

  root.innerHTML = `
    <div class="page">
      ${pageHeaderHTML("Notebook", "Progress", "Everything you've read, built, and answered — tracked in one place.")}
      <div class="progress-grid">
        <div class="progress-card">
          ${bar(`Lessons read (${state.lessonsRead.size}/${MOLECULE_LIST.length})`, lessonPct, TOKENS.blue)}
          ${bar(`Lab challenges solved (${state.labSolved.size}/${BUILD_TARGETS.length})`, labPct, TOKENS.teal)}
          ${bar(qr ? `Quiz score (${qr.score}/${qr.total})` : "Quiz not attempted", quizPct, TOKENS.coral)}
        </div>
        <div class="level-card">
          ${icon("award",28,TOKENS.gold)}
          <div class="mono" style="font-size:11px; color:${TOKENS.textDim}; letter-spacing:1px; margin:10px 0 4px;">YOUR LEVEL</div>
          <div style="font-family:'Space Grotesk', sans-serif; font-size:19px;">${level}</div>
          <div style="font-size:12px; color:${TOKENS.textDim}; margin-top:6px;">${overall}% overall</div>
        </div>
      </div>
    </div>
  `;
}

/* ============================================================
   NAV + ROUTER
============================================================ */
const NAV_ITEMS = [
  { key:"home", label:"Home", icon:"beaker" },
  { key:"lessons", label:"Lessons", icon:"book" },
  { key:"lab", label:"3D Lab", icon:"flask" },
  { key:"quiz", label:"Quiz", icon:"list" },
  { key:"progress", label:"Progress", icon:"trend" },
];

function renderNav(){
  const nav = document.getElementById("nav");
  nav.innerHTML = NAV_ITEMS.map(n => `
    <button class="nav-btn ${state.page===n.key?'active':''}" data-key="${n.key}">
      ${icon(n.icon,16)}${n.label}
    </button>`).join("");
  nav.querySelectorAll(".nav-btn").forEach(b => b.onclick = () => go(b.dataset.key));
}

function go(page, moleculeKey){
  if (moleculeKey){
    state.labInitial = moleculeKey;
    state.lab.current = moleculeKey;
    state.lab.mode = "view";
  }
  state.page = page;
  renderNav();
  renderPage();
}

function renderPage(){
  const root = document.getElementById("content");
  if (currentViewerCleanup) { currentViewerCleanup(); currentViewerCleanup = null; }
  if (state.page === "home") renderHome(root);
  else if (state.page === "lessons") renderLessons(root);
  else if (state.page === "lab") renderLab(root);
  else if (state.page === "quiz") renderQuiz(root);
  else if (state.page === "progress") renderProgress(root);
}

renderNav();
renderPage();
</script>
</body>
</html>
